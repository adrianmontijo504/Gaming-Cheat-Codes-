<!DOCTYPE html>
<html lang="en" data-page="home">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Cheat Lookup</title>
  <meta name="description" content="Browse cheat guides by game system." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <header class="site-header">
    <div class="container">
      <div class="eyebrow">Homepage</div>
      <h1>Game Cheat Lookup</h1>
      <p class="hero-copy">
        Pick a game system to open its game list. This setup is built so you can
        add more systems and more games later.
      </p>
    </div>
  </header>

  <main class="container">
    <section class="panel hero-panel">
      <div class="stats">
        <div class="stat-card">
          <span class="stat-label">Systems</span>
          <span class="stat-value" id="systemCount">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Games</span>
          <span class="stat-value" id="gameCount">0</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>Choose a system</h2>
          <p id="homeSummary">Loading...</p>
        </div>
      </div>

      <div id="systemGrid" class="card-grid"></div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
