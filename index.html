<div class="quick-start">
  <h2>Activate cheats</h2>

  <div class="quick-steps">
    <div class="quick-step">Open your save.</div>
    <div class="quick-step">
      Press <code>L1 + L2 + R1 + R2</code> together.
    </div>
    <div class="quick-step">
      Type <code>testingcheats on</code> and press
      <span class="ps-button ps-button--circle" aria-label="Circle button">◯</span>
    </div>
    <div class="quick-step">
      Enter any cheat below and press
      <span class="ps-button ps-button--circle" aria-label="Circle button">◯</span>
      again.
    </div>
  </div>

  <p class="warning">
    Warning: enabling <code>testingcheats</code> disables trophies/achievements for that save.
  </p>
</div>
